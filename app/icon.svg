<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="FIRAS">
  <!-- onyx square -->
  <rect width="512" height="512" rx="72" fill="#1A1A1A" />
  <!-- subtle gold hairline frame -->
  <rect x="20" y="20" width="472" height="472" rx="54" fill="none" stroke="#B8860B" stroke-width="2" opacity="0.45" />
  <!-- FIRAS crest: crown over a circular F monogram (scaled from the brand Logo) -->
  <g transform="translate(256 256) scale(6.4) translate(-100 -35.5)" stroke="#C99A2E" fill="#C99A2E">
    <!-- crown -->
    <path d="M86 18l4 8 5-9 5 9 5-9 5 9 4-8v10H86z" stroke-width="1.2" stroke-linejoin="round" fill-opacity="0.97" />
    <!-- circle monogram -->
    <circle cx="100" cy="44" r="15" stroke-width="1.4" fill="none" />
    <circle cx="100" cy="44" r="18.5" stroke-width="0.8" fill="none" opacity="0.55" />
    <!-- F monogram -->
    <path d="M95 36h11v3h-8v4h6v3h-6v8h-3z" stroke-width="0.3" fill-opacity="0.97" />
    <!-- flourish dots -->
    <circle cx="78" cy="44" r="1.6" stroke="none" />
    <circle cx="122" cy="44" r="1.6" stroke="none" />
  </g>
</svg>
